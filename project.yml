# Sprocket — "AI for Kids" learning app. Working title.
# Regenerate the Xcode project after adding/removing files with:  xcodegen
name: Sprocket
options:
  bundleIdPrefix: com.daviddefranceski
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_TEAM: L9SAXP2E2W
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only, matching Fernby
    GENERATE_INFOPLIST_FILE: YES
targets:
  Sprocket:
    type: application
    platform: iOS
    sources:
      - path: Sprocket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddefranceski.sprocket
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sprocket
