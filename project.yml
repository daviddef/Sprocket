# Sprocket — "AI for Kids" learning app. Working title.
# Regenerate the Xcode project after adding/removing files with:  xcodegen
name: Sprocket
options:
  bundleIdPrefix: com.daviddefranceski
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_TEAM: L9SAXP2E2W
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
targets:
  Sprocket:
    type: application
    platform: iOS
    sources:
      - path: Sprocket
    settings:
      base:
        # Must match the App Store Connect app record (Apple ID 6789490371),
        # whose Bundle ID is not editable once the record has a version.
        # Also keeps the StoreKit product IDs on a consistent prefix.
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddefranceski.sprocket
        # Must live on the TARGET, not the project: xcodegen writes its own
        # target-level default of "1,2", which shadows a project-level value.
        # Left universal, App Store upload fails validation 90474 — an
        # iPad-capable app must declare all four orientations for multitasking,
        # and this app is portrait-only by design.
        TARGETED_DEVICE_FAMILY: "1"          # iPhone only, matching Fernby
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_CFBundleDisplayName: Sprocket
schemes:
  Sprocket:
    build:
      targets:
        Sprocket: all
    run:
      config: Debug
      # Local StoreKit testing in the simulator (no App Store Connect needed).
      storeKitConfiguration: Store.storekit
    profile:
      config: Release
    archive:
      config: Release
